syntax = "proto3";

package lab;

option go_package = "github.com/ellipse/kernel-lab/api/proto";

service LabService {
  rpc RegisterLab(RegisterLabRequest) returns (RegisterLabResponse);

  rpc StartLab(LabRequest) returns (LabResponse);

  rpc StopLab(StopRequest) returns (StopResponse);

  rpc TerminalStream(stream TerminalInput) returns (stream TerminalOutput);

  rpc ExecCheck(ExecRequest) returns (ExecResponse);

  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse);
}

message RegisterLabRequest {
  string lab_id      = 1;
  string image       = 2;
  string initial_code = 3;
  string judge_code  = 4;
  string judge_type  = 5;
  double cpu_limit   = 6;
  int64  ram_limit_mb = 7;
}

message RegisterLabResponse {
  bool   success = 1;
  string lab_id  = 2;
}

message LabRequest {
  string lab_id = 1;
}

message LabResponse {
  string container_id  = 1;
  string initial_code  = 2;
}

message StopRequest {
  string container_id = 1;
}

message StopResponse {
  bool success = 1;
}

message TerminalInput {
  string container_id = 1;
  bytes  data         = 2;
}

message TerminalOutput {
  bytes data = 1;
}

message ExecRequest {
  string container_id = 1;
  string code         = 2;
  int32  timeout_seconds = 3;
}

message ExecResponse {
  string stdout    = 1;
  string stderr    = 2;
  int32  exit_code = 3;
}

message UploadFileRequest {
  string container_id = 1;
  string dest_path    = 2;
  string filename     = 3;
  bytes  content      = 4;
}

message UploadFileResponse {
  bool   success   = 1;
  string error_msg = 2;
}