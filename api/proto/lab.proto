syntax = "proto3";

package lab;

option go_package = "github.com/ellipse/kernel-lab/api/proto";

import "google/api/annotations.proto";

service LabService {
  rpc RegisterLab(RegisterLabRequest) returns (RegisterLabResponse) {
    option (google.api.http) = {
      post: "/v1/labs"
      body: "*"
    };
  }

  rpc StartLab(LabRequest) returns (LabResponse) {
    option (google.api.http) = {
      post: "/v1/labs/{lab_id}/start"
      body: "*"
    };
  }

  rpc StopLab(StopRequest) returns (StopResponse) {
    option (google.api.http) = {
      delete: "/v1/containers/{container_id}"
    };
  }

  rpc TerminalStream(stream TerminalInput) returns (stream TerminalOutput);

  rpc ExecCheck(ExecRequest) returns (ExecResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{container_id}/check"
      body: "*"
    };
  }

  rpc UploadFile(UploadFileRequest) returns (UploadFileResponse) {
    option (google.api.http) = {
      post: "/v1/containers/{container_id}/files"
      body: "*"
    };
  }

  rpc ExtendLab(ExtendLabRequest) returns (ExtendLabResponse);
}

message RegisterLabRequest {
  string lab_id      = 1;
  string image       = 2;
  string initial_code = 3;
  string judge_code  = 4;
  string judge_type  = 5;
  double cpu_limit   = 6;
  int64  ram_limit_mb = 7;
  int64  duration_seconds = 8;
}

message RegisterLabResponse {
  bool   success = 1;
  string lab_id  = 2;
}

message LabRequest {
  string lab_id = 1;
}

message LabResponse {
  string container_id  = 1;
  string initial_code  = 2;
}

message StopRequest {
  string container_id = 1;
}

message StopResponse {
  bool success = 1;
}

message TerminalInput {
  string container_id = 1;
  bytes  data         = 2;
  uint32 cols         = 3;
  uint32 rows         = 4;
}

message TerminalOutput {
  bytes data = 1;
}

message ExecRequest {
  string container_id = 1;
  string code         = 2;
  int32  timeout_seconds = 3;
}

message ExecResponse {
  string stdout    = 1;
  string stderr    = 2;
  int32  exit_code = 3;
}

message UploadFileRequest {
  string container_id = 1;
  string dest_path    = 2;
  string filename     = 3;
  bytes  content      = 4;
}

message UploadFileResponse {
  bool   success   = 1;
  string error_msg = 2;
}

message ExtendLabRequest {
  string container_id = 1;
  int64  extend_seconds = 2;
}

message ExtendLabResponse {
  bool   success   = 1;
  int64  new_ttl_seconds = 2;
  string error_msg = 3;
}